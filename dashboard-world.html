<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World - SUPERNOBA Zombie Agents</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-dark: #0f0f1a;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text-dim: #888;
    --blue: #7c83ff;
    --green: #4ade80;
    --yellow: #fdcb6e;
    --red: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    touch-action: none;
  }
  .nav-bar {
    background: #08080d;
    border-bottom: 1px solid var(--border);
    padding: 6px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .nav-link:hover { color: var(--text); background: var(--bg); }
  .nav-link.active { color: var(--blue); background: rgba(124,131,255,0.1); }
  .top-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar h1 { font-size: 16px; color: var(--blue); font-weight: 600; }
  .top-bar-info { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); }
  .top-bar-info .val { color: var(--blue); font-weight: 600; }
  .world-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  canvas {
    flex: 1;
    display: block;
    cursor: grab;
  }
  canvas:active { cursor: grabbing; }
  .side-panel {
    width: 280px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .agent-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    border-left: 3px solid var(--blue);
    transition: border-color 0.3s;
  }
  .agent-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; }
  .agent-card-name { font-size: 12px; font-weight: 600; flex: 1; }
  .agent-card-room { font-size: 10px; color: var(--text-dim); }
  .agent-card-bubble {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
    max-height: 60px;
    overflow: hidden;
    margin-top: 6px;
    font-style: italic;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
  .status-bar {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 6px 20px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  @media (max-width: 900px) {
    .side-panel { display: none; }
  }
</style>
</head>
<body>
<div class="nav-bar">
  <a href="/dashboard" class="nav-link">v1</a>
  <a href="/dashboard-v2" class="nav-link">Dashboard</a>

  </div>
</div>

<div class="status-bar">
  <span id="statusText">Connecting...</span>
  <span id="lastUpdateText">-</span>
</div>

<script>
// =====================================================================
// POLYFILL: roundRect for older browsers
// =====================================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// =====================================================================
// CREATURE PIXEL ART SYSTEM (Zombie + Dragon, genome-linked mutations)
// =====================================================================
const SPRITE_MODE = 'habbo'; // 'habbo' = creature mode (zombie/dragon)

// Genome data (polled from /api/genome for mutation tracking)
let genomeData = null; // { genes: { argumentDepth, adversarialIntensity, ... }, generation, ... }

function drawBlock(ctx, x, y, w, h, fill, outline) {
  if (outline === undefined) outline = true;
  ctx.fillStyle = fill;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
  if (outline) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(Math.round(x) + 0.5, Math.round(y) + 0.5, w - 1, h - 1);
  }
}

function darkenColor(hex, amount) {
  const r = Math.max(0, parseInt(hex.slice(1,3), 16) - amount);
  const g = Math.max(0, parseInt(hex.slice(3,5), 16) - amount);
  const b = Math.max(0, parseInt(hex.slice(5,7), 16) - amount);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

function lightenColor(hex, amount) {
  const r = Math.min(255, parseInt(hex.slice(1,3), 16) + amount);
  const g = Math.min(255, parseInt(hex.slice(3,5), 16) + amount);
  const b = Math.min(255, parseInt(hex.slice(5,7), 16) + amount);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

// =====================================================================
// CONFIG
// =====================================================================
const API_BASE = window.location.origin;
const POLL_MS = 3000;
const TILE = 48;
const HALF = TILE / 2;
const CHAR_SPEED = 1.8;

// =====================================================================
// ROOMS
// =====================================================================
const ROOMS = {
  debate:   { label: 'Sala Debate',  icon: 'chat',   color: '#7c83ff', x: 6, y: 2,  w: 6, h: 5 },
  reason:   { label: 'Razonamiento', icon: 'brain',  color: '#a78bfa', x: 0, y: 2,  w: 5, h: 5 },
  github:   { label: 'GitHub',       icon: 'code',   color: '#4ade80', x: 13,y: 2,  w: 5, h: 5 },
  stats:    { label: 'Analytics',    icon: 'chart',  color: '#fdcb6e', x: 0, y: 8,  w: 5, h: 4 },
  lounge:   { label: 'Break Room',   icon: 'coffee', color: '#f87171', x: 6, y: 8,  w: 6, h: 4 },
  kb:       { label: 'Knowledge',    icon: 'book',   color: '#38bdf8', x: 13,y: 8,  w: 5, h: 4 },
};
const ROOM_IDS = Object.keys(ROOMS);

const HALLWAY_Y = 7.5;
function getRoomCenter(roomId) {
  const r = ROOMS[roomId];
  if (!r) return { x: 9, y: 10 }; // fallback to lounge area
  return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
}

// =====================================================================
// ROLE COLORS + SKIN TONES
// =====================================================================
const ROLE_COLORS = {
  'arquitecto-software': '#6c5ce7', 'critico-tecnico': '#e17055',
  'ship-fast-founder': '#00b894',   'security-hardliner': '#d63031',
  'junior-dev-mantenedor': '#74b9ff','medico-clinico': '#6c5ce7',
  'investigador-radical': '#e17055', 'paciente-advocate': '#00b894',
  'eticista': '#fdcb6e',            'cost-optimizer': '#d63031',
  'defensor': '#74b9ff',            'devils-advocate': '#e17055',
  'mediador-provocador': '#00b894',
  'analista-datos': '#0984e3',      'estratega-largo-plazo': '#e84393',
  'abogado-usuario-final': '#00cec9','optimizador-costos': '#636e72',
  'innovador-disruptivo': '#fd79a8', 'integrador-sistemas': '#55efc4',
  'historiador-lecciones': '#fab1a0','simplificador': '#81ecec',
  'esceptico-metodico': '#dfe6e9',   'visionario-futuro': '#a29bfe',
};
const PALETTE = ['#6c5ce7','#0984e3','#00b894','#e17055','#e84393','#fdcb6e','#00cec9','#636e72','#fd79a8','#55efc4'];
const SKIN_TONES = ['#f5d0a9','#e8b88a','#c68c53','#8d5524','#d4a574','#f0c8a0','#b07840','#deb887'];
let paletteIdx = 0;
let skinIdx = 0;

function getAgentColor(name) {
  return ROLE_COLORS[name] || PALETTE[paletteIdx++ % PALETTE.length];
}

function getAgentSkin() {
  return SKIN_TONES[skinIdx++ % SKIN_TONES.length];
}

// =====================================================================
// AGENT CLASS
// =====================================================================
class Agent {
  constructor(name, color, roomId) {
    this.name = name;
    this.color = color;
    this.skin = getAgentSkin();
    this.room = roomId;
    const c = getRoomCenter(roomId);
    this.x = c.x + (Math.random() - 0.5) * 2;
    this.y = c.y + (Math.random() - 0.5) * 1.5;
    this.path = [];
    this.facing = 1;
    this.walkFrame = 0;
    this.walkTimer = 0;
    this.bubble = '';
    this.bubbleTimer = 0;
    this.bubbleLinesCache = null;
    this.messageCount = 0;
    this.isVirtual = true;
    this.role = '';
    this.idle = true;
    // Idle animation state
    this.idleTimer = Math.random() * 6;
    this.blinkTimer = Math.random() * 4 + 2;
    this.blinking = false;
    this.blinkDuration = 0;
    // Glow when speaking
    this.glowAlpha = 0;
    // Cached label width
    this._labelCache = null;
    this._labelText = '';
  }

  moveTo(roomId) {
    if (!ROOMS[roomId]) roomId = 'lounge';
    if (roomId === this.room && this.path.length === 0) return;
    const oldRoom = this.room;
    this.room = roomId;

    // Anti-overlap: circular distribution based on agent index in room
    const roomAgents = agentArr.filter(a => a.room === roomId && a.name !== this.name);
    const slotIndex = roomAgents.length;
    const totalSlots = roomAgents.length + 1;
    const room = ROOMS[roomId];
    const cx = room.x + room.w / 2;
    const cy = room.y + room.h / 2;
    // Distribute agents in a circle within the room (radius scales with room size)
    const radius = Math.min(room.w, room.h) * 0.3;
    const angle = (slotIndex / Math.max(totalSlots, 3)) * Math.PI * 2 + Math.PI / 4;
    const destX = cx + Math.cos(angle) * radius;
    const destY = cy + Math.sin(angle) * radius * 0.5; // Flatten for iso perspective

    // Smart pathfinding: check if rooms are adjacent (skip hallway)
    const oldRoomData = ROOMS[oldRoom];
    const newRoomData = ROOMS[roomId];
    if (oldRoomData && newRoomData) {
      const oldCx = oldRoomData.x + oldRoomData.w / 2;
      const oldCy = oldRoomData.y + oldRoomData.h / 2;
      const newCx = newRoomData.x + newRoomData.w / 2;
      const newCy = newRoomData.y + newRoomData.h / 2;
      const dist = Math.sqrt((oldCx - newCx) ** 2 + (oldCy - newCy) ** 2);

      // Adjacent rooms (distance < 8 tiles): direct path without hallway
      if (dist < 8) {
        this.path = [
          { x: destX, y: destY }
        ];
        this.idle = false;
        return;
      }

      // Same row rooms: go through hallway but shorter path
      if (Math.abs(oldCy - newCy) < 3) {
        this.path = [
          { x: this.x, y: HALLWAY_Y },
          { x: destX, y: HALLWAY_Y },
          { x: destX, y: destY }
        ];
        this.idle = false;
        return;
      }
    }

    // Default: full hallway route for distant rooms
    this.path = [
      { x: this.x, y: HALLWAY_Y },
      { x: destX, y: HALLWAY_Y },
      { x: destX, y: destY }
    ];
    this.idle = false;
  }

  showBubble(text, duration = 5000) {
    this.bubble = text.length > 80 ? text.substring(0, 77) + '...' : text;
    this.bubbleTimer = duration;
    this.bubbleLinesCache = null; // invalidate cache
    this.glowAlpha = 1.0;
  }

  getLabelWidth(ctx2d) {
    const label = this.name.length > 12 ? this.name.substring(0, 10) + '..' : this.name;
    if (this._labelText !== label) {
      this._labelText = label;
      ctx2d.font = 'bold 9px monospace'; // Must match font used in drawAgentHabbo nametag
      this._labelCache = ctx2d.measureText(label).width;
    }
    return this._labelCache;
  }

  update(dt) {
    // Walk along path
    if (this.path.length > 0) {
      const target = this.path[0];
      const dx = target.x - this.x;
      const dy = target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.15) {
        this.x = target.x;
        this.y = target.y;
        this.path.shift();
        if (this.path.length === 0) this.idle = true;
      } else {
        const speed = CHAR_SPEED * dt;
        this.x += (dx / dist) * speed;
        this.y += (dy / dist) * speed;
        if (Math.abs(dx) > 0.05) this.facing = dx > 0 ? 1 : -1;
      }
      this.walkTimer += dt;
      if (this.walkTimer > 0.15) {
        this.walkTimer = 0;
        this.walkFrame = (this.walkFrame + 1) % 4;
      }
    } else {
      // Smooth stop: decay walkFrame
      if (this.walkFrame !== 0) {
        this.walkTimer += dt;
        if (this.walkTimer > 0.1) {
          this.walkTimer = 0;
          this.walkFrame = 0;
        }
      }
    }

    // Idle breathing animation
    this.idleTimer += dt;

    // Blink
    this.blinkTimer -= dt;
    if (this.blinkTimer <= 0 && !this.blinking) {
      this.blinking = true;
      this.blinkDuration = 0.12;
    }
    if (this.blinking) {
      this.blinkDuration -= dt;
      if (this.blinkDuration <= 0) {
        this.blinking = false;
        this.blinkTimer = 2 + Math.random() * 4;
      }
    }

    // Bubble timer
    if (this.bubbleTimer > 0) {
      this.bubbleTimer -= dt * 1000;
      if (this.bubbleTimer <= 0) { this.bubble = ''; this.bubbleTimer = 0; this.bubbleLinesCache = null; }
    }

    // Glow fade
    if (this.glowAlpha > 0) {
      this.glowAlpha = Math.max(0, this.glowAlpha - dt * 0.3);
    }
  }
}

// =====================================================================
// RENDERER
// =====================================================================
const canvas = document.getElementById('worldCanvas');
const ctx = canvas.getContext('2d');
let camX = 0, camY = 0, zoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, dragCamX = 0, dragCamY = 0;

function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
window.addEventListener('resize', resize);
resize();

// ── Pan: Mouse ──
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragCamX = camX;
  dragCamY = camY;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camX = dragCamX + (e.clientX - dragStartX) / zoom;
  camY = dragCamY + (e.clientY - dragStartY) / zoom;
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);

// ── Zoom: normalized for mouse vs trackpad ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
  zoom = Math.max(0.4, Math.min(2.5, zoom * (1 - delta * 0.001)));
}, { passive: false });

// ── Touch: pan + pinch ──
let lastTouches = [];
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  lastTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragCamX = camX;
    dragCamY = camY;
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  if (touches.length === 1 && dragging) {
    camX = dragCamX + (touches[0].x - dragStartX) / zoom;
    camY = dragCamY + (touches[0].y - dragStartY) / zoom;
  } else if (touches.length === 2 && lastTouches.length === 2) {
    const oldDist = Math.hypot(lastTouches[0].x - lastTouches[1].x, lastTouches[0].y - lastTouches[1].y);
    const newDist = Math.hypot(touches[0].x - touches[1].x, touches[0].y - touches[1].y);
    if (oldDist > 0) zoom = Math.max(0.4, Math.min(2.5, zoom * (newDist / oldDist)));
  }
  lastTouches = touches;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  dragging = false;
  lastTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
});

// ── Isometric transform ──
function toScreen(gx, gy) {
  return { x: (gx - gy) * HALF, y: (gx + gy) * HALF * 0.5 };
}

// =====================================================================
// DRAWING FUNCTIONS
// =====================================================================

function drawRoom(room) {
  // Checkerboard floor — individual tiles with 2 tones
  for (let gx = room.x; gx < room.x + room.w; gx++) {
    for (let gy = room.y; gy < room.y + room.h; gy++) {
      const tc = [toScreen(gx, gy), toScreen(gx+1, gy), toScreen(gx+1, gy+1), toScreen(gx, gy+1)];
      const isLight = (gx + gy) % 2 === 0;
      ctx.beginPath();
      ctx.moveTo(tc[0].x, tc[0].y);
      for (let i = 1; i < 4; i++) ctx.lineTo(tc[i].x, tc[i].y);
      ctx.closePath();
      ctx.fillStyle = isLight ? room.color + '22' : room.color + '12';
      ctx.fill();
      ctx.strokeStyle = room.color + '35';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Room border
  const corners = [
    toScreen(room.x, room.y),
    toScreen(room.x + room.w, room.y),
    toScreen(room.x + room.w, room.y + room.h),
    toScreen(room.x, room.y + room.h),
  ];
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < 4; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
  ctx.strokeStyle = room.color + '66';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Walls with texture + baseboard
  const wallH = 16;

  // Left wall fill
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  ctx.lineTo(corners[0].x, corners[0].y - wallH);
  ctx.lineTo(corners[3].x, corners[3].y - wallH);
  ctx.lineTo(corners[3].x, corners[3].y);
  ctx.closePath();
  ctx.fillStyle = room.color + '15';
  ctx.fill();
  ctx.strokeStyle = room.color + '40';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Left wall diagonal texture
  ctx.save(); ctx.clip();
  ctx.strokeStyle = room.color + '12'; ctx.lineWidth = 0.5;
  for (let i = -wallH; i < 200; i += 8) {
    ctx.beginPath();
    ctx.moveTo(corners[0].x + i, corners[0].y - wallH);
    ctx.lineTo(corners[0].x + i + wallH, corners[0].y);
    ctx.stroke();
  }
  ctx.restore();
  // Left wall baseboard (zocalo)
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y - 3);
  ctx.lineTo(corners[3].x, corners[3].y - 3);
  ctx.lineTo(corners[3].x, corners[3].y);
  ctx.lineTo(corners[0].x, corners[0].y);
  ctx.closePath();
  ctx.fillStyle = room.color + '30';
  ctx.fill();

  // Back wall fill
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  ctx.lineTo(corners[0].x, corners[0].y - wallH);
  ctx.lineTo(corners[1].x, corners[1].y - wallH);
  ctx.lineTo(corners[1].x, corners[1].y);
  ctx.closePath();
  ctx.fillStyle = room.color + '10';
  ctx.fill();
  ctx.strokeStyle = room.color + '40';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Back wall diagonal texture
  ctx.save();
  var bwp = new Path2D();
  bwp.moveTo(corners[0].x, corners[0].y);
  bwp.lineTo(corners[0].x, corners[0].y - wallH);
  bwp.lineTo(corners[1].x, corners[1].y - wallH);
  bwp.lineTo(corners[1].x, corners[1].y);
  bwp.closePath();
  ctx.clip(bwp);
  ctx.strokeStyle = room.color + '10'; ctx.lineWidth = 0.5;
  for (let i = -200; i < 200; i += 8) {
    ctx.beginPath();
    ctx.moveTo(corners[0].x + i, corners[0].y - wallH);
    ctx.lineTo(corners[0].x + i + wallH, corners[0].y);
    ctx.stroke();
  }
  ctx.restore();
  // Back wall baseboard
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y - 3);
  ctx.lineTo(corners[1].x, corners[1].y - 3);
  ctx.lineTo(corners[1].x, corners[1].y);
  ctx.lineTo(corners[0].x, corners[0].y);
  ctx.closePath();
  ctx.fillStyle = room.color + '25';
  ctx.fill();

  // Label
  const center = toScreen(room.x + room.w / 2, room.y + room.h / 2);
  ctx.font = 'bold 11px system-ui';
  ctx.fillStyle = room.color + 'cc';
  ctx.textAlign = 'center';
  ctx.fillText(room.label, center.x, center.y - room.h * 6);

  // Icon
  const icons = { chat: '\u{1F4AC}', brain: '\u{1F9E0}', code: '\u{1F4BB}', chart: '\u{1F4CA}', coffee: '\u2615', book: '\u{1F4DA}' };
  ctx.font = '14px system-ui';
  ctx.fillText(icons[room.icon] || '', center.x, center.y - room.h * 6 - 16);
}

// ── Draw character ──
function drawAgent(agent) {
  const pos = toScreen(agent.x, agent.y);
  const sx = pos.x;
  const sy = pos.y;
  const f = agent.facing;
  const walking = agent.path.length > 0;
  const frame = agent.walkFrame;

  // Idle breathing
  const breathe = agent.idle ? Math.sin(agent.idleTimer * 1.5) * 0.15 : 0;

  ctx.save();
  ctx.translate(sx, sy);

  // Speaking glow
  if (agent.glowAlpha > 0) {
    ctx.beginPath();
    ctx.arc(0, -10, 25, 0, Math.PI * 2);
    ctx.fillStyle = agent.color + Math.floor(agent.glowAlpha * 40).toString(16).padStart(2, '0');
    ctx.fill();
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, 4, 10, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  const bodyBob = walking ? Math.sin(frame * Math.PI / 2) * 0.4 : breathe;
  const legOffset = walking ? Math.sin(frame * Math.PI / 2) * 4 : 0;

  // Legs
  ctx.strokeStyle = agent.color;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-3, -2 + bodyBob);
  ctx.lineTo(-3 + legOffset * 0.3, 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(3, -2 + bodyBob);
  ctx.lineTo(3 - legOffset * 0.3, 4);
  ctx.stroke();

  // Torso
  ctx.fillStyle = agent.color;
  ctx.beginPath();
  ctx.roundRect(-7, -18 + bodyBob, 14, 17, 3);
  ctx.fill();

  // Shirt detail
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(-4, -14 + bodyBob, 8, 8);

  // Arms
  const armSwing = walking ? Math.sin(frame * Math.PI / 2) * 15 : Math.sin(agent.idleTimer * 0.8) * 2;
  ctx.strokeStyle = agent.color;
  ctx.lineWidth = 3;
  ctx.save();
  ctx.translate(-7, -14 + bodyBob);
  ctx.rotate((-20 + armSwing) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 10); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.translate(7, -14 + bodyBob);
  ctx.rotate((20 - armSwing) * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 10); ctx.stroke();
  ctx.restore();

  // Head
  ctx.fillStyle = agent.skin;
  ctx.beginPath();
  ctx.arc(0, -24 + bodyBob, 8, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (with blink)
  if (!agent.blinking) {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(f * 2.5, -25 + bodyBob, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(f * 6, -25 + bodyBob, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Closed eyes (lines)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(f * 2.5 - 1.5, -25 + bodyBob);
    ctx.lineTo(f * 2.5 + 1.5, -25 + bodyBob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(f * 6 - 1.5, -25 + bodyBob);
    ctx.lineTo(f * 6 + 1.5, -25 + bodyBob);
    ctx.stroke();
  }

  // Hair
  ctx.fillStyle = agent.color;
  ctx.beginPath();
  ctx.ellipse(0, -30 + bodyBob, 9, 5, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Name tag (cached width)
  const label = agent._labelText || agent.name.substring(0, 10);
  const tw = agent.getLabelWidth(ctx);
  ctx.beginPath();
  ctx.roundRect(-tw / 2 - 4, -42 + bodyBob, tw + 8, 13, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fill();
  ctx.font = 'bold 9px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = agent.color;
  ctx.fillText(label, 0, -33 + bodyBob);

  ctx.restore();

  // Speech bubble
  if (agent.bubble) {
    drawBubble(agent, sx, sy - 50);
  }
}

// ── ZOMBIE PIXEL ART SYSTEM (inspired by reference zombie sprite) ──
// Randomized zombie agents: green/gray skin, torn clothes, wounds, accessories
const ZOMBIE_SKINS = ['#7a9e6e','#8faa7a','#6b8b5e','#9aab84','#b0b89a','#6e7d5e','#8a9b6f','#a0a87a','#5e7050','#c8c89a'];
const ZOMBIE_CLOTHES = ['#3a3f47','#4a4f57','#2c3038','#484d55','#555a62','#38404a','#343940','#5a5f67','#2e3540','#464b53'];
const ZOMBIE_PANTS = ['#6b4f3a','#5a4530','#7a5e48','#4e3b2a','#8a7060','#6d5040','#5c4838','#786050','#4a3828','#907868'];
const ZOMBIE_WOUND_COLORS = ['#c0392b','#e74c3c','#a93226','#d35400','#8b0000','#b22222'];
const ZOMBIE_EYE_COLORS = ['#f1c40f','#e67e22','#e74c3c','#2ecc71','#fdcb6e','#ff6b6b'];
const ZOMBIE_HEAD_TYPES = ['normal','exposed_brain','bandaged','cracked','one_eye','stitched','rotting','skull'];
const ZOMBIE_EXTRAS = ['none','chain','bolt_neck','torn_ear','blood_drip','bone_arm','hook_hand','missing_jaw'];

// Deterministic hash from agent name for consistent randomization
function nameHash(name) {
  var h = 0;
  for (var i = 0; i < name.length; i++) { h = ((h << 5) - h + name.charCodeAt(i)) | 0; }
  return Math.abs(h);
}

function drawDragon(ctx, x, y, time) {
  var wingFlap = Math.sin(time * 3) * 2;
  drawBlock(ctx, x, y, 10, 7, '#27ae60');
  drawBlock(ctx, x+1, y+1, 8, 5, '#2ecc71', false);
  drawBlock(ctx, x+8, y-3, 7, 6, '#27ae60');
  drawBlock(ctx, x+13, y-1, 2, 1, '#e74c3c', false);
  drawBlock(ctx, x+11, y-2, 2, 2, '#f1c40f', false);
  drawBlock(ctx, x+2, y-5+wingFlap, 6, 3, '#2ecc7188');
  drawBlock(ctx, x+3, y-7+wingFlap, 4, 2, '#27ae6088');
  drawBlock(ctx, x-4, y+2, 5, 3, '#27ae60');
  drawBlock(ctx, x-7, y+1, 4, 2, '#2ecc71');
  drawBlock(ctx, x-9, y, 3, 2, '#27ae60');
  drawBlock(ctx, x-10, y-1, 2, 2, '#e74c3c', false);
  drawBlock(ctx, x+2, y+7, 2, 3, '#1e8449');
  drawBlock(ctx, x+7, y+7, 2, 3, '#1e8449');
}

function drawAgentHabbo(agent) {
  const pos = toScreen(agent.x, agent.y);
  const sx = pos.x, sy = pos.y;
  const f = agent.facing;
  const walking = agent.path.length > 0;
  const frame = agent.walkFrame;
  // Zombie shamble: slower, more erratic breathing
  const breathe = agent.idle ? Math.sin(agent.idleTimer * 0.8) * 0.5 : 0;
  const bodyBob = breathe;
  // Zombie lurch: asymmetric leg movement
  const legOffset = walking ? Math.sin(frame * Math.PI / 2) * 3.5 : 0;
  const armSwing = walking ? Math.sin(frame * Math.PI / 2) * 3 : Math.sin(agent.idleTimer * 0.5) * 0.8;
  // Zombie hunched posture: lean forward when walking
  const hunch = walking ? 2 : 0;

  // Deterministic zombie randomization from name
  if (!agent._hashInit) {
    var h = nameHash(agent.name);
    agent._zSkin = ZOMBIE_SKINS[h % ZOMBIE_SKINS.length];
    agent._zClothes = ZOMBIE_CLOTHES[(h >> 3) % ZOMBIE_CLOTHES.length];
    agent._zPants = ZOMBIE_PANTS[(h >> 5) % ZOMBIE_PANTS.length];
    agent._zWound = ZOMBIE_WOUND_COLORS[(h >> 7) % ZOMBIE_WOUND_COLORS.length];
    agent._zEye = ZOMBIE_EYE_COLORS[(h >> 9) % ZOMBIE_EYE_COLORS.length];
    agent._zHead = ZOMBIE_HEAD_TYPES[(h >> 11) % ZOMBIE_HEAD_TYPES.length];
    agent._zExtra = ZOMBIE_EXTRAS[(h >> 13) % ZOMBIE_EXTRAS.length];
    agent._zShoulderW = 13 + (h % 4);
    agent._zLegH = 8 + (h >> 2) % 3;
    agent._zTorsoH = 12 + (h >> 4) % 3;
    agent._hasDragon = false;
    // Base creature type: ~30% dragons, 70% zombies (before genome overrides)
    agent._creatureType = (h % 8 < 3) ? 'dragon' : 'zombie';
    // Wound positions (randomized per zombie)
    agent._zWoundX = -3 + (h >> 6) % 6;
    agent._zWoundY = 2 + (h >> 8) % 5;
    agent._hashInit = true;
    // Apply genome mutations if available
    applyGenomeMutations(agent);
  }
  var zs = agent._zSkin, zc = agent._zClothes, zp = agent._zPants, zw = agent._zWound;
  var sw = agent._zShoulderW, lh = agent._zLegH, th = agent._zTorsoH;
  var halfSw = Math.floor(sw / 2);

  ctx.save();
  ctx.translate(sx, sy);

  // Eerie glow when speaking
  if (agent.glowAlpha > 0) {
    const ga = Math.floor(agent.glowAlpha * 50).toString(16).padStart(2,'0');
    ctx.beginPath(); ctx.arc(hunch*f, -16, 30, 0, Math.PI*2);
    ctx.fillStyle = '#4ade80' + ga; ctx.fill();
  }

  // Shadow (slightly elongated for zombie)
  ctx.beginPath(); ctx.ellipse(hunch*f, 5, 14, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

  // === FEET (tattered shoes/bare) ===
  var feetY = 0 + bodyBob;
  drawBlock(ctx, -6+legOffset*0.3+hunch*f*0.3, feetY, 5, 3, darkenColor(zp, 20));
  drawBlock(ctx, 1-legOffset*0.3+hunch*f*0.3, feetY, 5, 3, darkenColor(zp, 20));
  // Toe bones peeking out on some
  if (agent._zExtra === 'bone_arm' || agent._zHead === 'skull') {
    drawBlock(ctx, -5+legOffset*0.3+hunch*f*0.3, feetY, 2, 1, '#e8dcc8', false);
  }

  // === LEGS (torn pants) ===
  var legY = feetY - lh;
  drawBlock(ctx, -5+legOffset*0.4+hunch*f*0.3, legY, 4, lh, zp);
  drawBlock(ctx, 1-legOffset*0.4+hunch*f*0.3, legY, 4, lh, zp);
  // Torn patches on legs
  drawBlock(ctx, -4+legOffset*0.3, legY+2, 2, 2, darkenColor(zp, 30), false);
  // Exposed skin through torn pants
  drawBlock(ctx, 2-legOffset*0.3, legY+lh-3, 2, 2, zs, false);

  // === TORSO (hunched forward, torn jacket) ===
  var torsoY = legY - th + bodyBob;
  // Main jacket
  drawBlock(ctx, -halfSw+hunch*f, torsoY, sw, th, zc);
  // Jacket detail (collar/lapel darker)
  drawBlock(ctx, -halfSw+2+hunch*f, torsoY, sw-4, 3, darkenColor(zc, 20), false);
  // Shirt underneath (visible through tears)
  drawBlock(ctx, -halfSw+3+hunch*f, torsoY+4, sw-6, th-6, lightenColor(zc, 15), false);
  // Wound on torso
  drawBlock(ctx, agent._zWoundX+hunch*f, torsoY+agent._zWoundY, 3, 2, zw, false);
  // Belt
  drawBlock(ctx, -halfSw+hunch*f, torsoY+th-2, sw, 2, darkenColor(zc, 40), false);

  // === ARMS (one reaching forward zombie-style) ===
  var armY = torsoY + 1;
  var armH = th - 3;
  // Back arm (normal-ish)
  drawBlock(ctx, -halfSw-3+hunch*f, armY+armSwing, 4, armH, zc);
  drawBlock(ctx, -halfSw-3+hunch*f, armY+armH+armSwing, 4, 3, zs, false);
  // Front arm (extended forward, zombie reach)
  var reachX = halfSw-1+hunch*f;
  var reachExt = walking ? 4 : 2;
  drawBlock(ctx, reachX, armY-armSwing-reachExt, 4, armH+reachExt, zc);
  // Hand (reaching, skin showing)
  drawBlock(ctx, reachX, armY-armSwing-reachExt-2, 4, 3, zs, false);
  // Fingers (pixel claws)
  drawBlock(ctx, reachX+1, armY-armSwing-reachExt-3, 1, 2, darkenColor(zs, 30), false);
  drawBlock(ctx, reachX+3, armY-armSwing-reachExt-3, 1, 2, darkenColor(zs, 30), false);

  // === HEAD (slightly tilted, zombie features) ===
  var headY = torsoY - 12 + bodyBob;
  var headTilt = f * (walking ? 1 : 0);
  // Base head shape
  drawBlock(ctx, -7+headTilt+hunch*f, headY, 14, 11, zs);
  // Jaw (slightly open, darker)
  drawBlock(ctx, -5+headTilt+hunch*f, headY+8, 10, 3, darkenColor(zs, 15), false);
  // Ears
  drawBlock(ctx, -8+headTilt+hunch*f, headY+3, 2, 3, darkenColor(zs, 10), false);
  drawBlock(ctx, 6+headTilt+hunch*f, headY+3, 2, 3, darkenColor(zs, 10), false);

  // Eyes (glowing zombie eyes)
  if (!agent.blinking) {
    var ex1 = f > 0 ? -3 : -1, ex2 = f > 0 ? 2 : 0;
    var eOff = headTilt+hunch*f;
    // Eye sockets (dark)
    drawBlock(ctx, ex1-1+eOff, headY+3, 4, 4, '#1a1a1a', false);
    drawBlock(ctx, ex2+eOff, headY+3, 4, 4, '#1a1a1a', false);
    // Glowing pupils
    drawBlock(ctx, ex1+eOff, headY+4, 2, 2, agent._zEye, false);
    if (agent._zHead !== 'one_eye') {
      drawBlock(ctx, ex2+1+eOff, headY+4, 2, 2, agent._zEye, false);
    } else {
      // X for missing eye
      drawBlock(ctx, ex2+1+eOff, headY+4, 2, 2, zw, false);
    }
  } else {
    var ex1 = f > 0 ? -3 : -1, ex2 = f > 0 ? 2 : 0;
    var eOff = headTilt+hunch*f;
    drawBlock(ctx, ex1+eOff, headY+5, 3, 1, '#1a1a1a', false);
    drawBlock(ctx, ex2+1+eOff, headY+5, 3, 1, '#1a1a1a', false);
  }

  // Mouth (open, showing teeth)
  var mOff = headTilt+hunch*f;
  if (agent.bubble) {
    // Open mouth screaming
    drawBlock(ctx, -2+mOff, headY+8, 5, 3, '#1a0a0a', false);
    drawBlock(ctx, -1+mOff, headY+8, 1, 1, '#ddd', false); // tooth
    drawBlock(ctx, 1+mOff, headY+8, 1, 1, '#ddd', false); // tooth
    drawBlock(ctx, 0+mOff, headY+10, 3, 1, zw, false); // blood
  } else {
    drawBlock(ctx, -1+mOff, headY+8, 4, 2, '#2a1a1a', false);
    drawBlock(ctx, 0+mOff, headY+8, 1, 1, '#ddd', false); // tooth
    drawBlock(ctx, 2+mOff, headY+8, 1, 1, '#ccc', false); // tooth
  }

  // === HEAD TYPE VARIATIONS ===
  var hOff = headTilt+hunch*f;
  switch(agent._zHead) {
    case 'exposed_brain':
      // Cracked skull top with brain showing
      drawBlock(ctx, -5+hOff, headY-3, 10, 4, darkenColor(zs, 10));
      drawBlock(ctx, -3+hOff, headY-4, 7, 3, '#c0392b');
      drawBlock(ctx, -2+hOff, headY-3, 5, 2, '#e8a0a0', false); // brain pink
      drawBlock(ctx, -1+hOff, headY-4, 3, 2, '#d4817a', false); // brain folds
      break;
    case 'bandaged':
      drawBlock(ctx, -6+hOff, headY-2, 12, 3, '#e8e0d0');
      drawBlock(ctx, -7+hOff, headY+1, 14, 2, '#e8e0d0');
      drawBlock(ctx, -5+hOff, headY-1, 2, 1, zw, false); // blood seep
      break;
    case 'cracked':
      drawBlock(ctx, -6+hOff, headY-2, 12, 3, darkenColor(zs, 15));
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-2+hOff, headY-2); ctx.lineTo(1+hOff, headY+3); ctx.lineTo(-1+hOff, headY+6); ctx.stroke();
      break;
    case 'stitched':
      drawBlock(ctx, -6+hOff, headY-2, 12, 3, darkenColor(zs, 10));
      ctx.strokeStyle = '#333'; ctx.lineWidth = 0.8;
      for (var si = 0; si < 4; si++) {
        ctx.beginPath(); ctx.moveTo(-3+si*2+hOff, headY+2); ctx.lineTo(-3+si*2+hOff, headY+5); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(-3+hOff, headY+3); ctx.lineTo(5+hOff, headY+3); ctx.stroke();
      break;
    case 'rotting':
      drawBlock(ctx, -6+hOff, headY-2, 12, 3, darkenColor(zs, 20));
      drawBlock(ctx, 2+hOff, headY+2, 3, 3, darkenColor(zs, 40), false); // rotted patch
      drawBlock(ctx, 3+hOff, headY+3, 2, 2, '#5a4a3a', false); // exposed
      break;
    case 'skull':
      drawBlock(ctx, -6+hOff, headY-2, 12, 3, '#e8dcc8');
      drawBlock(ctx, -5+hOff, headY-1, 10, 2, '#ddd0c0', false);
      break;
    default: // 'normal' or 'one_eye'
      // Sparse zombie hair
      drawBlock(ctx, -6+hOff, headY-3, 4, 3, darkenColor(zs, 30));
      drawBlock(ctx, 1+hOff, headY-2, 5, 2, darkenColor(zs, 30));
      drawBlock(ctx, -4+hOff, headY-4, 3, 2, darkenColor(zs, 25));
      break;
  }

  // === ZOMBIE EXTRAS ===
  switch(agent._zExtra) {
    case 'chain':
      ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-halfSw+hunch*f, torsoY+2); 
      ctx.lineTo(-halfSw-5+hunch*f, torsoY+6);
      ctx.lineTo(-halfSw-3+hunch*f, torsoY+10); ctx.stroke();
      break;
    case 'bolt_neck':
      drawBlock(ctx, -9+hOff, headY+6, 3, 2, '#888');
      drawBlock(ctx, 6+hOff, headY+6, 3, 2, '#888');
      break;
    case 'torn_ear':
      drawBlock(ctx, -9+hOff, headY+2, 2, 4, zs, false);
      drawBlock(ctx, -9+hOff, headY+5, 1, 2, zw, false);
      break;
    case 'blood_drip':
      var drip = Math.floor(agent.idleTimer * 2) % 6;
      drawBlock(ctx, 3+hOff, headY+9, 1, 2+drip, zw, false);
      break;
    case 'hook_hand':
      drawBlock(ctx, -halfSw-4+hunch*f, armY+armH+armSwing, 2, 5, '#888');
      drawBlock(ctx, -halfSw-5+hunch*f, armY+armH+armSwing+3, 3, 1, '#aaa', false);
      break;
    case 'missing_jaw':
      drawBlock(ctx, -4+mOff, headY+9, 8, 2, darkenColor(zs, 30));
      drawBlock(ctx, -2+mOff, headY+10, 5, 1, zw, false);
      break;
  }

  // === NAME TAG (green-tinted for zombie theme) ===
  var label = agent._labelText || agent.name.substring(0, 10);
  var tw = agent.getLabelWidth(ctx);
  ctx.imageSmoothingEnabled = true;
  ctx.fillStyle = 'rgba(10,20,10,0.85)';
  ctx.fillRect(Math.round(-tw/2-5), headY-22, tw+10, 13);
  ctx.strokeStyle = '#4ade8066'; ctx.lineWidth = 1;
  ctx.strokeRect(Math.round(-tw/2-5)+0.5, headY-22+0.5, tw+9, 12);
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = agent.color;
  ctx.fillText(label, 0, headY-12);
  ctx.imageSmoothingEnabled = false;

  ctx.restore();

  // Dragon companion (rare)
  if (agent._hasDragon) {
    drawDragon(ctx, sx + f * 20, sy - 5, agent.idleTimer);
  }

  // Thinking indicator: green zombie thought bubbles
  const agentState = getAgentState(agent.name);
  if (agentState.state === 'thinking' && !agent.bubble) {
    ctx.save();
    ctx.translate(sx, sy);
    const dotTime = Date.now() / 500;
    const dotY = headY - 28;
    for (let di = 0; di < 3; di++) {
      const bounce = Math.sin(dotTime + di * 0.9) * 3;
      const alpha = (Math.sin(dotTime + di * 0.9) + 1) / 2;
      ctx.globalAlpha = 0.3 + alpha * 0.7;
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.arc(-4 + di * 4, dotY + bounce, 1.5 + di * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  if (agent.bubble) { drawBubble(agent, sx, sy - 65); }
}

const DRAGON_SCALES = ['#27ae60','#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c','#2c3e50','#e74c3c','#16a085','#f39c12'];
const DRAGON_BELLY = ['#2ecc71','#3498db','#9b59b6','#e74c3c','#e67e22','#1dd1a1','#34495e','#ff6b6b','#00d2d3','#feca57'];
const DRAGON_TYPES = ['fire','ice','shadow','nature','electric','void','gold','blood'];
const DRAGON_HORNS = ['curved','straight','crown','ram','demon','antler','spike','none'];
const DRAGON_WINGS_STYLES = ['bat','feathered','membrane','torn','crystal','flame'];

function drawAgentDragon(agent) {
  const pos = toScreen(agent.x, agent.y);
  const sx = pos.x, sy = pos.y;
  const f = agent.facing;
  const walking = agent.path.length > 0;
  const frame = agent.walkFrame;
  const breathe = agent.idle ? Math.sin(agent.idleTimer * 1.2) * 0.4 : 0;
  const bodyBob = breathe;
  const legOffset = walking ? Math.sin(frame * Math.PI / 2) * 3 : 0;
  const armSwing = walking ? Math.sin(frame * Math.PI / 2) * 2.5 : Math.sin(agent.idleTimer * 0.6) * 0.5;
  const wingFlap = Math.sin(agent.idleTimer * 2.5) * 3;
  const tailWag = Math.sin(agent.idleTimer * 1.8) * 2;

  if (!agent._hashInit) {
    var h = nameHash(agent.name);
    agent._dScales = DRAGON_SCALES[h % DRAGON_SCALES.length];
    agent._dBelly = DRAGON_BELLY[h % DRAGON_BELLY.length];
    agent._dType = DRAGON_TYPES[(h >> 3) % DRAGON_TYPES.length];
    agent._dHorns = DRAGON_HORNS[(h >> 5) % DRAGON_HORNS.length];
    agent._dWings = DRAGON_WINGS_STYLES[(h >> 7) % DRAGON_WINGS_STYLES.length];
    agent._dEye = ZOMBIE_EYE_COLORS[(h >> 9) % ZOMBIE_EYE_COLORS.length];
    agent._creatureType = 'dragon';
    agent._hasDragon = false;
    agent._hashInit = true;
  }
  var sc = agent._dScales, bl = agent._dBelly;

  ctx.save();
  ctx.translate(sx, sy);

  // Glow
  if (agent.glowAlpha > 0) {
    const ga = Math.floor(agent.glowAlpha * 50).toString(16).padStart(2,'0');
    ctx.beginPath(); ctx.arc(0, -16, 30, 0, Math.PI*2);
    ctx.fillStyle = sc + ga; ctx.fill();
  }

  // Shadow
  ctx.beginPath(); ctx.ellipse(0, 6, 15, 5, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

  // === TAIL (behind body) ===
  drawBlock(ctx, -12*f, 0+tailWag*0.3, 6, 3, sc);
  drawBlock(ctx, -17*f, -1+tailWag*0.6, 5, 3, sc);
  drawBlock(ctx, -21*f, -2+tailWag, 4, 2, lightenColor(sc, 10));
  // Tail tip (varies by type)
  if (agent._dType === 'fire' || agent._dType === 'blood') {
    drawBlock(ctx, -24*f, -3+tailWag, 3, 3, '#e74c3c', false);
    drawBlock(ctx, -23*f, -4+tailWag, 2, 1, '#f39c12', false);
  } else if (agent._dType === 'ice') {
    drawBlock(ctx, -24*f, -3+tailWag, 4, 2, '#74b9ff', false);
  } else {
    drawBlock(ctx, -24*f, -3+tailWag, 3, 3, lightenColor(sc, 30), false);
  }

  // === FEET (dragon claws) ===
  var feetY = 2 + bodyBob;
  drawBlock(ctx, -5+legOffset*0.3, feetY, 5, 3, darkenColor(sc, 30));
  drawBlock(ctx, 1-legOffset*0.3, feetY, 5, 3, darkenColor(sc, 30));
  // Claws
  drawBlock(ctx, -6+legOffset*0.3, feetY+2, 2, 1, '#ddd', false);
  drawBlock(ctx, 5-legOffset*0.3, feetY+2, 2, 1, '#ddd', false);

  // === LEGS (muscular dragon legs) ===
  var legY = feetY - 8;
  drawBlock(ctx, -5+legOffset*0.4, legY, 5, 8, sc);
  drawBlock(ctx, 1-legOffset*0.4, legY, 5, 8, sc);
  drawBlock(ctx, -4+legOffset*0.4, legY+1, 3, 3, lightenColor(sc, 15), false);
  drawBlock(ctx, 2-legOffset*0.4, legY+1, 3, 3, lightenColor(sc, 15), false);

  // === TORSO (broad dragon chest) ===
  var torsoY = legY - 13 + bodyBob;
  drawBlock(ctx, -8, torsoY, 16, 14, sc);
  // Belly plates
  drawBlock(ctx, -5, torsoY+3, 10, 9, bl);
  drawBlock(ctx, -4, torsoY+4, 8, 2, lightenColor(bl, 15), false);
  drawBlock(ctx, -4, torsoY+7, 8, 2, lightenColor(bl, 10), false);
  drawBlock(ctx, -4, torsoY+10, 8, 2, lightenColor(bl, 5), false);

  // === WINGS (behind arms) ===
  var wingY = torsoY - 2 + wingFlap;
  var wingX = f > 0 ? -9 : 2;
  if (agent._dWings !== 'none') {
    // Wing membrane
    drawBlock(ctx, wingX - 8*f, wingY, 8, 12, sc + '88');
    drawBlock(ctx, wingX - 14*f, wingY-2, 6, 8, sc + '66');
    // Wing bones
    drawBlock(ctx, wingX - 2*f, wingY+1, 2, 10, darkenColor(sc, 20));
    drawBlock(ctx, wingX - 8*f, wingY, 2, 8, darkenColor(sc, 20));
    if (agent._dWings === 'torn') {
      // Holes in wings
      drawBlock(ctx, wingX - 10*f, wingY+3, 3, 3, '#0f0f1a', false);
    }
    if (agent._dWings === 'flame') {
      drawBlock(ctx, wingX - 14*f, wingY+6, 4, 3, '#e74c3c88', false);
      drawBlock(ctx, wingX - 12*f, wingY+8, 3, 2, '#f39c1288', false);
    }
  }

  // === ARMS (dragon arms with claws) ===
  var armY = torsoY + 2;
  drawBlock(ctx, -10, armY+armSwing, 3, 9, sc);
  drawBlock(ctx, 7, armY-armSwing, 3, 9, sc);
  // Clawed hands
  drawBlock(ctx, -11, armY+9+armSwing, 4, 3, lightenColor(sc, 10), false);
  drawBlock(ctx, 7, armY+9-armSwing, 4, 3, lightenColor(sc, 10), false);
  drawBlock(ctx, -11, armY+11+armSwing, 1, 2, '#ddd', false);
  drawBlock(ctx, 10, armY+11-armSwing, 1, 2, '#ddd', false);

  // === HEAD (dragon head with snout) ===
  var headY = torsoY - 11 + bodyBob;
  // Main head
  drawBlock(ctx, -7, headY, 14, 10, sc);
  // Snout (protruding forward)
  drawBlock(ctx, f > 0 ? 5 : -9, headY+3, 5, 5, sc);
  drawBlock(ctx, f > 0 ? 5 : -9, headY+5, 5, 3, bl, false); // snout belly
  // Nostrils
  var nOff = f > 0 ? 8 : -6;
  if (agent.bubble) {
    // Fire breath!
    var fireT = agent.idleTimer * 5;
    drawBlock(ctx, nOff + f*4, headY+3, 4, 2, '#e74c3c', false);
    drawBlock(ctx, nOff + f*7, headY+2, 3, 3, '#f39c12', false);
    drawBlock(ctx, nOff + f*9, headY+1, 2, 2, '#ffeaa7', false);
  } else {
    drawBlock(ctx, nOff, headY+4, 1, 1, '#1a1a1a', false);
    drawBlock(ctx, nOff+2, headY+4, 1, 1, '#1a1a1a', false);
  }
  // Eyes (glowing)
  if (!agent.blinking) {
    var ex1 = f > 0 ? -3 : 0, ex2 = f > 0 ? 2 : 5;
    drawBlock(ctx, ex1, headY+2, 3, 3, '#1a1a1a', false);
    drawBlock(ctx, ex2, headY+2, 3, 3, '#1a1a1a', false);
    drawBlock(ctx, ex1+1, headY+3, 1, 1, agent._dEye, false);
    drawBlock(ctx, ex2+1, headY+3, 1, 1, agent._dEye, false);
  } else {
    var ex1 = f > 0 ? -3 : 0, ex2 = f > 0 ? 2 : 5;
    drawBlock(ctx, ex1, headY+3, 3, 1, '#1a1a1a', false);
    drawBlock(ctx, ex2, headY+3, 3, 1, '#1a1a1a', false);
  }

  // === HORNS ===
  switch(agent._dHorns) {
    case 'curved':
      drawBlock(ctx, -6, headY-4, 3, 4, darkenColor(sc, 20));
      drawBlock(ctx, -8, headY-6, 2, 3, darkenColor(sc, 30));
      drawBlock(ctx, 3, headY-4, 3, 4, darkenColor(sc, 20));
      drawBlock(ctx, 5, headY-6, 2, 3, darkenColor(sc, 30)); break;
    case 'straight':
      drawBlock(ctx, -5, headY-6, 2, 6, '#e8dcc8');
      drawBlock(ctx, 3, headY-6, 2, 6, '#e8dcc8'); break;
    case 'crown':
      drawBlock(ctx, -6, headY-3, 12, 2, '#f1c40f');
      drawBlock(ctx, -4, headY-6, 2, 3, '#f1c40f');
      drawBlock(ctx, -1, headY-7, 2, 4, '#f1c40f');
      drawBlock(ctx, 2, headY-6, 2, 3, '#f1c40f'); break;
    case 'ram':
      drawBlock(ctx, -8, headY-2, 3, 5, darkenColor(sc, 25));
      drawBlock(ctx, -9, headY+2, 2, 3, darkenColor(sc, 30));
      drawBlock(ctx, 5, headY-2, 3, 5, darkenColor(sc, 25));
      drawBlock(ctx, 6, headY+2, 2, 3, darkenColor(sc, 30)); break;
    case 'demon':
      drawBlock(ctx, -7, headY-5, 2, 5, '#8b0000');
      drawBlock(ctx, -8, headY-7, 2, 3, '#a00000');
      drawBlock(ctx, 5, headY-5, 2, 5, '#8b0000');
      drawBlock(ctx, 6, headY-7, 2, 3, '#a00000'); break;
    case 'spike':
      drawBlock(ctx, -4, headY-4, 2, 3, sc);
      drawBlock(ctx, -1, headY-6, 2, 5, lightenColor(sc, 15));
      drawBlock(ctx, 2, headY-4, 2, 3, sc); break;
    default: // antler, none
      drawBlock(ctx, -6, headY-3, 12, 3, darkenColor(sc, 15)); break;
  }

  // Spinal ridge (down the back)
  for (var ri = 0; ri < 4; ri++) {
    drawBlock(ctx, -1, torsoY - 2 + ri * 4, 2, 3, darkenColor(sc, 15), false);
  }

  // === NAME TAG ===
  var label = agent._labelText || agent.name.substring(0, 10);
  var tw = agent.getLabelWidth(ctx);
  ctx.imageSmoothingEnabled = true;
  ctx.fillStyle = 'rgba(10,10,25,0.85)';
  ctx.fillRect(Math.round(-tw/2-5), headY-24, tw+10, 13);
  ctx.strokeStyle = sc + '88'; ctx.lineWidth = 1;
  ctx.strokeRect(Math.round(-tw/2-5)+0.5, headY-24+0.5, tw+9, 12);
  ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = agent.color;
  ctx.fillText(label, 0, headY-14);
  ctx.imageSmoothingEnabled = false;

  ctx.restore();

  // Thinking indicator
  const agentState = getAgentState(agent.name);
  if (agentState.state === 'thinking' && !agent.bubble) {
    ctx.save();
    ctx.translate(sx, sy);
    const dotTime = Date.now() / 500;
    for (let di = 0; di < 3; di++) {
      const bounce = Math.sin(dotTime + di * 0.9) * 3;
      const alpha = (Math.sin(dotTime + di * 0.9) + 1) / 2;
      ctx.globalAlpha = 0.3 + alpha * 0.7;
      ctx.fillStyle = sc;
      ctx.beginPath();
      ctx.arc(-4 + di * 4, headY - 30 + bounce, 1.5 + di * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  if (agent.bubble) { drawBubble(agent, sx, sy - 65); }
}

// =====================================================================
// GENOME-LINKED MUTATION SYSTEM
// Maps Strategy Genome genes → visual creature mutations
// =====================================================================
function applyGenomeMutations(agent) {
  if (!genomeData || !genomeData.genes || agent._genomeApplied) return;
  var g = genomeData.genes;
  var h = nameHash(agent.name);

  // explorationRate high → more likely to be a dragon
  if (g.explorationRate > 0.6 && (h % 3 === 0)) {
    agent._creatureType = 'dragon';
  }

  // argumentDepth high → exposed_brain heads for zombies
  if (agent._creatureType !== 'dragon' && g.argumentDepth > 0.65) {
    if (h % 4 < 2) agent._zHead = 'exposed_brain';
  }

  // adversarialIntensity high → more wounds, red eyes
  if (agent._creatureType !== 'dragon' && g.adversarialIntensity > 0.6) {
    agent._zEye = '#e74c3c';
    if (h % 3 === 0) agent._zExtra = 'blood_drip';
  }

  // collaborationBias high → chain extras (connected)
  if (agent._creatureType !== 'dragon' && g.collaborationBias > 0.65) {
    if (h % 3 === 1) agent._zExtra = 'chain';
  }

  // decompositionAffinity high → antenna/bolt_neck (analytical)
  if (g.decompositionAffinity > 0.6) {
    if (agent._creatureType !== 'dragon' && h % 3 === 2) agent._zExtra = 'bolt_neck';
    if (agent._creatureType === 'dragon' && h % 2 === 0) agent._dHorns = 'crown';
  }

  // concisenessPreference high → leaner body
  if (agent._creatureType !== 'dragon' && g.concisenessPreference > 0.65) {
    agent._zShoulderW = Math.max(12, (agent._zShoulderW || 14) - 2);
  }

  agent._genomeApplied = true;
  agent._mutations = getAgentMutationList(agent);
}

function getAgentMutationList(agent) {
  var muts = [];
  if (agent._creatureType === 'dragon') {
    muts.push('\u{1F409} ' + (agent._dType || 'dragon'));
    if (agent._dHorns && agent._dHorns !== 'none') muts.push('\u{1F451} ' + agent._dHorns);
    if (agent._dWings) muts.push('\u{1FA78} ' + agent._dWings);
  } else {
    muts.push('\u{1F9DF} zombie');
    if (agent._zHead && agent._zHead !== 'normal') muts.push('\u{1F480} ' + agent._zHead);
    if (agent._zExtra && agent._zExtra !== 'none') muts.push('\u26A1 ' + agent._zExtra);
    if (agent._zEye) {
      var eyeName = agent._zEye === '#f1c40f' ? 'gold' : agent._zEye === '#e74c3c' ? 'crimson' :
        agent._zEye === '#2ecc71' ? 'toxic' : agent._zEye === '#e67e22' ? 'amber' : 'glow';
      muts.push('\u{1F441} ' + eyeName);
    }
  }
  return muts;
}

// ── Speech bubble PIXEL-ART (escalonado, dark blue, monospace) ──
function drawBubble(agent, x, y) {
  var text = agent.bubble;

  // Cache line wrapping
  if (!agent.bubbleLinesCache) {
    ctx.imageSmoothingEnabled = true;
    ctx.font = '10px monospace';
    var maxW = 150;
    var words = text.split(' ');
    var lines = [];
    var line = '';
    for (var wi = 0; wi < words.length; wi++) {
      var test = line ? line + ' ' + words[wi] : words[wi];
      if (ctx.measureText(test).width > maxW) {
        if (line) lines.push(line);
        line = words[wi];
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    if (lines.length > 3) { lines.length = 3; lines[2] = lines[2].substring(0, lines[2].length - 3) + '...'; }
    agent.bubbleLinesCache = lines;
    ctx.imageSmoothingEnabled = false;
  }

  var lines = agent.bubbleLinesCache;
  var lineH = 13;
  var padX = 8, padY = 6;
  var bw = 170;
  var bh = lines.length * lineH + padY * 2;
  var bx = x - bw / 2;
  var by = y - bh - 10;

  var alpha = agent.bubbleTimer < 1000 ? agent.bubbleTimer / 1000 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.imageSmoothingEnabled = true;

  // Pixel-art bubble body (stepped corners)
  ctx.fillStyle = '#e8e8f0';
  ctx.fillRect(Math.round(bx+2), Math.round(by), bw-4, bh);
  ctx.fillRect(Math.round(bx), Math.round(by+2), bw, bh-4);
  ctx.fillRect(Math.round(bx+1), Math.round(by+1), bw-2, bh-2);

  // Pixel border (1px black, stepped)
  ctx.fillStyle = '#000';
  ctx.fillRect(Math.round(bx+2), Math.round(by-1), bw-4, 1);   // top
  ctx.fillRect(Math.round(bx+2), Math.round(by+bh), bw-4, 1);  // bottom
  ctx.fillRect(Math.round(bx-1), Math.round(by+2), 1, bh-4);   // left
  ctx.fillRect(Math.round(bx+bw), Math.round(by+2), 1, bh-4);  // right
  // Corner steps
  ctx.fillRect(Math.round(bx), Math.round(by), 2, 2);
  ctx.fillRect(Math.round(bx+bw-2), Math.round(by), 2, 2);
  ctx.fillRect(Math.round(bx), Math.round(by+bh-2), 2, 2);
  ctx.fillRect(Math.round(bx+bw-2), Math.round(by+bh-2), 2, 2);
  // Inner corner white to clean up
  ctx.fillStyle = '#e8e8f0';
  ctx.fillRect(Math.round(bx+1), Math.round(by+1), 1, 1);
  ctx.fillRect(Math.round(bx+bw-2), Math.round(by+1), 1, 1);
  ctx.fillRect(Math.round(bx+1), Math.round(by+bh-2), 1, 1);
  ctx.fillRect(Math.round(bx+bw-2), Math.round(by+bh-2), 1, 1);

  // Pixel tail (stepped triangle)
  ctx.fillStyle = '#e8e8f0';
  ctx.fillRect(Math.round(x-4), Math.round(by+bh), 8, 3);
  ctx.fillRect(Math.round(x-2), Math.round(by+bh+3), 4, 2);
  ctx.fillRect(Math.round(x-1), Math.round(by+bh+5), 2, 2);
  // Tail border
  ctx.fillStyle = '#000';
  ctx.fillRect(Math.round(x-5), Math.round(by+bh), 1, 3);
  ctx.fillRect(Math.round(x+4), Math.round(by+bh), 1, 3);
  ctx.fillRect(Math.round(x-3), Math.round(by+bh+3), 1, 2);
  ctx.fillRect(Math.round(x+2), Math.round(by+bh+3), 1, 2);
  ctx.fillRect(Math.round(x-2), Math.round(by+bh+5), 1, 2);
  ctx.fillRect(Math.round(x+1), Math.round(by+bh+5), 1, 2);

  // Text (dark on light bubble)
  ctx.font = '10px monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'left';
  for (var li = 0; li < lines.length; li++) {
    ctx.fillText(lines[li], bx + padX, by + padY + 10 + li * lineH);
  }

  ctx.imageSmoothingEnabled = false;
  ctx.restore();
}

// ── Hallway ──
function drawHallway() {
  const leftEdge = -1;
  const rightEdge = 19;
  const a = toScreen(leftEdge, HALLWAY_Y - 0.3);
  const b = toScreen(rightEdge, HALLWAY_Y - 0.3);
  const c = toScreen(rightEdge, HALLWAY_Y + 0.3);
  const d = toScreen(leftEdge, HALLWAY_Y + 0.3);

  ctx.beginPath();
  ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
  ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();

  ctx.setLineDash([4, 8]);
  const m1 = toScreen(leftEdge, HALLWAY_Y);
  const m2 = toScreen(rightEdge, HALLWAY_Y);
  ctx.beginPath();
  ctx.moveTo(m1.x, m1.y); ctx.lineTo(m2.x, m2.y);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Furniture with isometric height ──
function drawIsoBox(gx, gy, gw, gh, elevation, fill, stroke) {
  const floor = [
    toScreen(gx, gy), toScreen(gx + gw, gy),
    toScreen(gx + gw, gy + gh), toScreen(gx, gy + gh),
  ];
  // Top face
  const top = floor.map(c => ({ x: c.x, y: c.y - elevation }));
  ctx.beginPath();
  ctx.moveTo(top[0].x, top[0].y);
  for (let i = 1; i < 4; i++) ctx.lineTo(top[i].x, top[i].y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Right face
  ctx.beginPath();
  ctx.moveTo(top[1].x, top[1].y);
  ctx.lineTo(top[2].x, top[2].y);
  ctx.lineTo(floor[2].x, floor[2].y);
  ctx.lineTo(floor[1].x, floor[1].y);
  ctx.closePath();
  ctx.fillStyle = stroke; // darker
  ctx.fill();

  // Left face
  ctx.beginPath();
  ctx.moveTo(top[2].x, top[2].y);
  ctx.lineTo(top[3].x, top[3].y);
  ctx.lineTo(floor[3].x, floor[3].y);
  ctx.lineTo(floor[2].x, floor[2].y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(dp.x-1, dp.y-18, 16, 10);
  ctx.strokeStyle = '#fdcb6e'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dp.x+1, dp.y-10); ctx.lineTo(dp.x+4, dp.y-14);

  // KB room: bookshelf with colored books
  var bk = toScreen(14.5, 9.5);
  drawBlock(ctx, bk.x-5, bk.y-16, 30, 3, '#8b4513');
  drawBlock(ctx, bk.x-5, bk.y-8, 30, 3, '#8b4513');
  drawBlock(ctx, bk.x-5, bk.y, 30, 3, '#8b4513');
  var bc = ['#e17055','#6c5ce7','#00b894','#fdcb6e','#0984e3','#e84393','#00cec9','#d63031'];
  for (var bi = 0; bi < 8; bi++) {
    var bx = bk.x - 3 + bi * 3.3;
    var shelf = bi < 4 ? 0 : 1;
    var by = bk.y - 15 + shelf * 8;
    var bh = 4 + ((bi * 7) % 3);
    ctx.fillStyle = bc[bi]; ctx.fillRect(bx, by+(5-bh), 2.5, bh);
  }
}

// =====================================================================
// STATE
// =====================================================================
let agents = {};
let agentArr = []; // cached array, updated on change
let lastDebateId = null;
let lastMsgCount = 0;
let debateData = null;
let agentsDirty = false;

// ── Micro-round room assignments (from orchestrator) ──
let microAssignments = {}; // { agentName: { room, subtopic, status } }
let microPhaseActive = false;

// ── Room assignment logic (using roles, state, and "thinking" detection) ──
// Agent state tracking for visual indicators
const agentStates = {}; // { agentName: { state: 'thinking'|'speaking'|'reflecting'|'idle', since: timestamp } }

function updateAgentState(name, state) {
  agentStates[name] = { state, since: Date.now() };
}

function getAgentState(name) {
  return agentStates[name] || { state: 'idle', since: 0 };
}

function getAgentRoom(agentName, debate) {
  if (!debate) return 'lounge';
  const msgs = debate.messages || [];
  const participants = debate.participants || [];
  const spoken = debate.spokenThisRound || [];
  const pending = debate.pendingAgents || debate.pending || [];
  const agent = participants.find(p => p.name === agentName);
  const role = agent?.role || '';
  const phase = debate.currentPhase || '';

  // How recently did this agent speak? (index from end)
  let lastSpokeIndex = -1;
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].participantName === agentName) { lastSpokeIndex = msgs.length - 1 - i; break; }
  }

  // MICRO-ROUND OVERRIDE: If a micro-round is active and this agent has a room assignment,
  // send them to that room regardless of other logic. This makes agents visually
  // move between rooms when micro-debates are happening.
  if (microPhaseActive && microAssignments[agentName]) {
    const ma = microAssignments[agentName];
    if (ma.status === 'debating') {
      updateAgentState(agentName, 'thinking');
      return ma.room || 'reason';
    }
    if (ma.status === 'concluded') {
      updateAgentState(agentName, 'reflecting');
      return 'stats'; // Concluded agents go to analytics to review results
    }
  }

  // Currently speaking (last message is theirs) → Sala Debate
  if (lastSpokeIndex === 0) {
    updateAgentState(agentName, 'speaking');
    return 'debate';
  }

  // THINKING STATE: Agent is pending (hasn't spoken yet this round) and it's their turn
  // They should be in "Razonamiento" with a thinking indicator, not stuck in lounge
  if (pending.includes && pending.includes(agentName)) {
    updateAgentState(agentName, 'thinking');
    return 'reason'; // Thinking agents go to Razonamiento, NOT lounge
  }

  // Just spoke (1-3 msgs ago) → Razonamiento (reflecting on responses)
  if (lastSpokeIndex >= 1 && lastSpokeIndex <= 3) {
    updateAgentState(agentName, 'reflecting');
    return 'reason';
  }

  // Phase-based assignment
  if (phase === 'VEREDICTO' || phase === 'APLICACIÓN') return 'stats';
  if (phase === 'ANÁLISIS') {
    if (role.includes('analista')) return 'github';
    if (role.includes('arquitecto')) return 'reason';
    return 'kb';
  }
  if (phase === 'PROPUESTAS') {
    if (role.includes('proponedor') || role.includes('implement')) return 'github';
    if (role.includes('arquitecto')) return 'reason';
    return 'kb'; // Better default: check knowledge base while waiting
  }
  if (phase === 'REVISIÓN') {
    if (role.includes('revisor') || role.includes('seguridad') || role.includes('calidad')) return 'reason';
    if (role.includes('coordinador')) return 'stats';
    return 'kb';
  }

  // Hasn't spoken this round → role-based waiting room (not lounge!)
  if (!spoken.includes(agentName)) {
    updateAgentState(agentName, 'thinking');
    if (role.includes('analista') || role.includes('proponedor') || role.includes('implement') || role.includes('dev') || role.includes('codigo')) return 'github';
    if (role.includes('arquitecto') || role.includes('estrateg') || role.includes('revisor')) return 'reason';
    if (role.includes('coordinador') || role.includes('datos') || role.includes('optimizador') || role.includes('priorizador')) return 'stats';
    if (role.includes('investigador') || role.includes('historiador') || role.includes('contexto') || role.includes('doc')) return 'kb';
    // Debate roles go to debate room
    if (role.includes('critic') || role.includes('abogado') || role.includes('antagonist') || role.includes('escep')) return 'debate';
    // DEFAULT: reason room (thinking) instead of lounge
    return 'reason';
  }

  // Spoke this round, waiting for others → Knowledge Base (learning from discussion)
  if (spoken.includes(agentName)) {
    updateAgentState(agentName, 'idle');
    // Alternate between KB and reason based on role for visual variety
    if (role.includes('analista') || role.includes('dev') || role.includes('codigo')) return 'github';
    if (role.includes('investigador') || role.includes('doc')) return 'kb';
    return 'reason';
  }

  return 'lounge';
}

// =====================================================================
// POLL & UPDATE
// =====================================================================
async function pollWorld() {
  try {
    const res = await fetch(`${API_BASE}/api/debate/live`);
    if (!res.ok) throw new Error('err');
    const data = await res.json();

    document.getElementById('statusText').textContent = data.debate ? 'Connected' : 'No active debate';
    document.getElementById('lastUpdateText').textContent = `Updated: ${new Date().toLocaleTimeString()}`;

    if (!data.debate) {
      debateData = null;
      return;
    }

    const d = data.debate;
    debateData = d;

    document.getElementById('topicDisplay').textContent = (d.topic || '').substring(0, 50);
    document.getElementById('roundDisplay').textContent = `${d.currentRound || d.round || '-'}/${d.maxRounds || d.totalRounds || '-'}`;
    document.getElementById('phaseDisplay').textContent = d.currentPhase || '-';

    const participants = d.participants || [];
    document.getElementById('agentCountDisplay').textContent = participants.length;

    let changed = false;
    participants.forEach(p => {
      if (!agents[p.name]) {
        agents[p.name] = new Agent(p.name, getAgentColor(p.name), 'lounge');
        agents[p.name].role = p.role || '';
        agents[p.name].isVirtual = p.isVirtual !== false;
        changed = true;
      }
      agents[p.name].messageCount = p.messageCount || 0;
      agents[p.name].role = p.role || agents[p.name].role;

      const targetRoom = getAgentRoom(p.name, d);
      if (targetRoom !== agents[p.name].room) {
        agents[p.name].moveTo(targetRoom);
      }
    });

    if (changed) agentArr = Object.values(agents);

    // New messages -> speech bubbles
    const msgs = d.messages || [];
    if (d.id !== lastDebateId) {
      lastDebateId = d.id;
      lastMsgCount = 0;
    }
    if (msgs.length > lastMsgCount) {
      for (let i = lastMsgCount; i < msgs.length; i++) {
        const m = msgs[i];
        // FIX: debate-manager uses participantName, not name
        const agentKey = m.participantName || m.name;
        if (agents[agentKey]) {
          agents[agentKey].showBubble(m.text || m.preview || '', 6000);
          agents[agentKey].moveTo('debate');
        }
      }
      lastMsgCount = msgs.length;
    }

    // Poll micro-round assignments (if orchestrator exposes them)
    try {
      const microRes = await fetch(`${API_BASE}/api/micro-assignments`);
      if (microRes.ok) {
        const microData = await microRes.json();
        if (microData && microData.assignments) {
          microAssignments = microData.assignments;
          microPhaseActive = Object.keys(microAssignments).length > 0;
          // Update phase display when micro-round is active
          if (microPhaseActive) {
            document.getElementById('phaseDisplay').textContent =
              `🔬 MICRO-ROUND (${Object.keys(microAssignments).length} agents in micro-debates)`;
          }
        } else {
          microAssignments = {};
          microPhaseActive = false;
        }
      }
    } catch { /* micro endpoint not available, ignore */ }

    // Poll genome data for mutation tracking
    try {
      const genomeRes = await fetch(`${API_BASE}/api/genome`);
      if (genomeRes.ok) {
        const gData = await genomeRes.json();
        if (gData && gData.genome) {
          genomeData = gData.genome;
        }
      }
    } catch { /* genome endpoint not available, ignore */ }

    renderAgentCards();

  } catch (e) {
    document.getElementById('statusText').textContent = 'Connection error';
  }
}

// ── Side panel: only update when data changes ──
let lastCardHash = '';
function renderAgentCards() {
  const hash = agentArr.map(a => `${a.name}:${a.room}:${a.messageCount}:${a.bubble ? 1 : 0}`).join('|');
  if (hash === lastCardHash) return;
  lastCardHash = hash;

  const container = document.getElementById('agentCards');
  if (agentArr.length === 0) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:8px">No agents yet</div>';
    return;
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  container.innerHTML = agentArr.map(a => {
    const roomLabel = ROOMS[a.room]?.label || a.room;
    const state = getAgentState(a.name);
    const stateEmoji = state.state === 'thinking' ? '💡' : state.state === 'speaking' ? '🗣️' : state.state === 'reflecting' ? '🤔' : '⏸️';
    const stateLabel = state.state === 'thinking' ? 'Thinking...' : state.state === 'speaking' ? 'Speaking' : state.state === 'reflecting' ? 'Reflecting' : 'Idle';
    const stateColor = state.state === 'thinking' ? 'var(--yellow)' : state.state === 'speaking' ? 'var(--green)' : state.state === 'reflecting' ? 'var(--blue)' : 'var(--text-dim)';
    return `<div class="agent-card" style="border-left-color:${esc(a.color)}">
      <div class="agent-card-header">
        <div class="agent-dot" style="background:${esc(a.color)}${state.state === 'thinking' ? ';animation:pulse 1.5s infinite' : ''}"></div>
        <div class="agent-card-name">${esc(a.name)}</div>
        <div class="agent-card-room">${esc(roomLabel)}</div>
      </div>
      <div style="font-size:10px;color:var(--text-dim)">${esc(a.role)} | ${a.messageCount} msgs</div>
      <div style="font-size:10px;color:${stateColor};margin-top:2px">${stateEmoji} ${stateLabel}</div>
      ${a._mutations && a._mutations.length ? `<div style="font-size:9px;color:#a0a8a0;margin-top:2px;display:flex;flex-wrap:wrap;gap:3px">${a._mutations.map(m => `<span style="background:rgba(255,255,255,0.06);padding:1px 4px;border-radius:3px;border:1px solid rgba(255,255,255,0.08)">${esc(m)}</span>`).join('')}</div>` : ''}
      ${microAssignments[a.name] ? `<div style="font-size:9px;color:#4ade80;margin-top:2px">\u{1F52C} ${esc((microAssignments[a.name].subtopic||'').substring(0,40))}</div>` : ''}
      ${a.bubble ? `<div class="agent-card-bubble">"${esc(a.bubble)}"</div>` : ''}
    </div>`;
  }).join('');
}

function renderRoomLegend() {
  document.getElementById('roomLegend').innerHTML = Object.values(ROOMS).map(r =>
    `<div class="legend-item"><div class="legend-color" style="background:${r.color}"></div>${r.label}</div>`
  ).join('');
}

// =====================================================================
// MICRO-TOPIC TREE VISUALIZATION
// =====================================================================
let microTreeData = null; // Cached tree data from API
let microTreeLastFetch = 0;

function drawMicroTopicTree() {
  // Group assignments by room for connection drawing
  const roomGroups = {}; // { room: [{ agentName, subtopic, status }] }
  const subtopicRooms = {}; // { subtopic: room }

  for (const [agentName, ma] of Object.entries(microAssignments)) {
    const room = ma.room || 'reason';
    if (!roomGroups[room]) roomGroups[room] = [];
    roomGroups[room].push({ agentName, subtopic: ma.subtopic, status: ma.status });
    if (ma.subtopic) subtopicRooms[ma.subtopic] = room;
  }

  const t = Date.now() / 1000;
  ctx.save();
  ctx.imageSmoothingEnabled = true;

  // === CENTRAL HUB: Floating "brain" node above center ===
  const hubRoom = ROOMS.debate;
  const hubScreen = toScreen(hubRoom.x + hubRoom.w/2, hubRoom.y - 1);
  const hubX = hubScreen.x;
  const hubY = hubScreen.y - 60;

  // Pulsing glow around hub
  const pulse = (Math.sin(t * 2) + 1) / 2;
  ctx.beginPath();
  ctx.arc(hubX, hubY, 18 + pulse * 4, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(74, 222, 128, ${0.05 + pulse * 0.08})`;
  ctx.fill();

  // Hub circle
  ctx.beginPath();
  ctx.arc(hubX, hubY, 14, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(10, 25, 10, 0.9)';
  ctx.fill();
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Hub icon
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4ade80';
  ctx.fillText('\u{1F9E0}', hubX, hubY + 4);

  // Hub label
  ctx.font = 'bold 8px monospace';
  ctx.fillStyle = '#4ade80cc';
  ctx.fillText('MICRO-ROUND', hubX, hubY - 20);

  // === CONNECTIONS: Lines from hub to each room with active micro-debates ===
  const activeRooms = Object.keys(roomGroups);
  for (let ri = 0; ri < activeRooms.length; ri++) {
    const roomId = activeRooms[ri];
    const room = ROOMS[roomId];
    if (!room) continue;

    const roomCenter = toScreen(room.x + room.w/2, room.y + room.h/2);
    const targetX = roomCenter.x;
    const targetY = roomCenter.y - room.h * 4;
    const group = roomGroups[roomId];
    const isActive = group.some(g => g.status === 'debating');
    const isConcluded = group.every(g => g.status === 'concluded');

    // Animated connection line
    ctx.beginPath();
    ctx.moveTo(hubX, hubY + 14);
    // Bezier curve for organic look
    const midX = (hubX + targetX) / 2;
    const midY = (hubY + targetY) / 2 - 10;
    ctx.quadraticCurveTo(midX, midY, targetX, targetY);

    if (isActive) {
      // Pulsing green line for active debates
      const dashOffset = t * 30;
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = -dashOffset;
      ctx.strokeStyle = '#4ade80aa';
      ctx.lineWidth = 1.5;
    } else if (isConcluded) {
      // Solid green for concluded
      ctx.setLineDash([]);
      ctx.strokeStyle = '#4ade8066';
      ctx.lineWidth = 1;
    } else {
      ctx.setLineDash([2, 6]);
      ctx.strokeStyle = '#4ade8033';
      ctx.lineWidth = 0.5;
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Traveling dot along the line (data flowing)
    if (isActive) {
      const dotT = (t * 0.5 + ri * 0.3) % 1;
      const dx = hubX + (targetX - hubX) * dotT;
      const dy = hubY + 14 + (targetY - hubY - 14) * dotT - Math.sin(dotT * Math.PI) * 15;
      ctx.beginPath();
      ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#4ade80';
      ctx.fill();
    }

    // === SUBTOPIC NODE at the room ===
    const nodeX = targetX;
    const nodeY = targetY;
    const subtopic = group[0]?.subtopic || 'Micro-debate';
    const shortTopic = subtopic.length > 30 ? subtopic.slice(0, 28) + '..' : subtopic;

    // Node background (pixel-art stepped rect)
    const nodePad = 4;
    ctx.font = '7px monospace';
    const ntw = ctx.measureText(shortTopic).width;
    const nodeW = ntw + nodePad * 2 + 4;
    const nodeH = 18;
    const nx = nodeX - nodeW / 2;
    const ny = nodeY - nodeH / 2;

    // Stepped pixel border
    ctx.fillStyle = isActive ? 'rgba(10,30,10,0.92)' : 'rgba(10,20,10,0.75)';
    ctx.fillRect(nx + 2, ny, nodeW - 4, nodeH);
    ctx.fillRect(nx, ny + 2, nodeW, nodeH - 4);
    ctx.fillRect(nx + 1, ny + 1, nodeW - 2, nodeH - 2);

    // Border
    ctx.fillStyle = isActive ? '#4ade80' : isConcluded ? '#4ade8066' : '#4ade8033';
    ctx.fillRect(nx + 2, ny - 1, nodeW - 4, 1);
    ctx.fillRect(nx + 2, ny + nodeH, nodeW - 4, 1);
    ctx.fillRect(nx - 1, ny + 2, 1, nodeH - 4);
    ctx.fillRect(nx + nodeW, ny + 2, 1, nodeH - 4);

    // Status icon
    const statusIcon = isConcluded ? '\u2705' : isActive ? '\u{1F52C}' : '\u23f3';
    ctx.font = '7px system-ui';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(statusIcon, nx + 3, ny + 12);

    // Subtopic text
    ctx.font = '7px monospace';
    ctx.fillStyle = isActive ? '#4ade80' : '#4ade8099';
    ctx.fillText(shortTopic, nx + 13, ny + 11);

    // Agent count badge
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#4ade80';
    ctx.fillText(group.length + '\u{1F9DF}', nodeX, ny + nodeH + 9);
  }

  ctx.restore();
}

// =====================================================================
// GAME LOOP
// =====================================================================
let lastTime = 0;
const roomValues = Object.values(ROOMS);

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  // Update agents
  for (let i = 0; i < agentArr.length; i++) agentArr[i].update(dt);

  const W = canvas.width;
  const H = canvas.height;
  const dpr = devicePixelRatio;

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  // Camera
  ctx.setTransform(zoom * dpr, 0, 0, zoom * dpr, W / 2 + camX * zoom * dpr, H / 4 + camY * zoom * dpr);

  // World
  drawHallway();
  for (let i = 0; i < roomValues.length; i++) drawRoom(roomValues[i]);
  drawFurniture();

  // Micro-topic tree overlay (drawn above rooms, below agents)
  if (microPhaseActive && Object.keys(microAssignments).length > 0) {
    drawMicroTopicTree();
  }

  // Pixel art mode
  ctx.imageSmoothingEnabled = false;

  // Agents sorted by depth
  const sorted = agentArr.slice().sort((a, b) => (a.y - b.y) || (a.x - b.x));
  for (let i = 0; i < sorted.length; i++) {
    const ag = sorted[i];
    if (ag._creatureType === 'dragon') drawAgentDragon(ag);
    else drawAgentHabbo(ag); // zombie
  }

  requestAnimationFrame(gameLoop);
}

// =====================================================================
// INIT
// =====================================================================
renderRoomLegend();
pollWorld();
setInterval(pollWorld, POLL_MS);
requestAnimationFrame(gameLoop);
camY = -40;
</script>
